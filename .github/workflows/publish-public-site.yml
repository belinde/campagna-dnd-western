name: Pubblica sito pubblico

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v6

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Dipendenze script pubblicazione
        run: pip install -r tools/scripts/requirements-public-site.txt

      - name: Genera sorgente player-safe
        run: python3 tools/scripts/build_public_site.py --output tools/build/public-site

      - name: Compila sito con Jekyll
        uses: actions/jekyll-build-pages@v1.0.13
        with:
          source: tools/build/public-site
          destination: tools/build/_site

      - name: Carica artefatto Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: tools/build/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
